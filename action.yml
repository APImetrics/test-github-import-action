name: "APIm Import (test repo)"
description: "Test repo action: upload an APImetrics import YAML/JSON to the APImetrics API"
author: "APIm"
inputs:
  file:
    description: "Path to a YAML or JSON file in the repo"
    required: false
  openapi_file:
    description: "Path to an OpenAPI specification file (YAML or JSON)"
    required: false
  openapi_mapping_file:
    description: "Path to OpenAPI mapping config that controls generation"
    required: false
  base_project_file:
    description: "Optional APIm import file to merge generated OpenAPI calls into"
    required: false
  template:
    description: "Path to a ytt template file or directory"
    required: false
  template_values:
    description: "Path to a ytt values file (optional)"
    required: false
  token:
    description: "Bearer token for APImetrics API (required unless dry_run=true)"
    required: false
  validate_schema:
    description: "Validate against the APImetrics JSON Schema before upload"
    required: false
    default: "true"
  schema_url:
    description: "Override schema URL"
    required: false
    default: "https://client.apimetrics.io/api/2/import/schema.json"
  endpoint:
    description: "Override API endpoint for import"
    required: false
    default: "https://client.apimetrics.io/api/2/import/"
  ytt_version:
    description: "ytt version to download (e.g., v0.48.0)"
    required: false
    default: "v0.48.0"
  ytt_args:
    description: "Extra args to pass to ytt"
    required: false
    default: ""
  generated_tag:
    description: "Tag used to mark generated calls/workflows for merge cleanup"
    required: false
    default: "openapi-sync"
  cleanup_generated:
    description: "Remove stale generated entities that are no longer in OpenAPI selection"
    required: false
    default: "true"
  dry_run:
    description: "Generate and validate the document but skip upload"
    required: false
    default: "false"
  output_file:
    description: "Optional path to write the generated APIm import JSON"
    required: false
  debug:
    description: "Log resolved endpoint and request summary (no secrets)"
    required: false
    default: "false"
runs:
  using: "node20"
  main: "dist/index.js"
branding:
  icon: "upload"
  color: "blue"
